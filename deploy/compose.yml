services:
  mom:
    build:
      context: docker/mom
    container_name: mom
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - ${MOM_BASE}/repo:/repo
      - ${MOM_BASE}/data:/data
      - ${MOM_BASE}/state:/state
    environment:
      REPO_URL: ${REPO_URL}
      REPO_BRANCH: ${REPO_BRANCH:-main}
      CHECK_INTERVAL_SECONDS: ${CHECK_INTERVAL_SECONDS:-120}
      STARTUP_GRACE_SECONDS: ${STARTUP_GRACE_SECONDS:-25}
      SUCCESS_LOG_TEXT: ${SUCCESS_LOG_TEXT:-⚡️ Mom bot connected and listening!}
      MOM_DATA_DIR: /data
    command:
      - sh
      - -lc
      - |
        set -euo pipefail
        apk add --no-cache git bash >/dev/null 2>&1 || true
  
        REPO_DIR=/repo
        STATE_DIR=/state
        GOOD_FILE="$$STATE_DIR/good_commit"
        CHECK_INTERVAL_SECONDS="$${CHECK_INTERVAL_SECONDS:-120}"
  
        echo mkdir -p "$$STATE_DIR"
        mkdir -p "$$STATE_DIR"
        echo mkdir -p "$$REPO_DIR"
        mkdir -p "$$REPO_DIR"
  
        if [ ! -d "$$REPO_DIR/.git" ]; then
          rm -rf "$$REPO_DIR"/*
          git clone --branch "$${REPO_BRANCH:-main}" --single-branch "$$REPO_URL" "$$REPO_DIR"
        fi
  
        cd "$$REPO_DIR"
        HUSKY=0 npm install
        # Build only mom's dependency chain
        npm run build --workspace=packages/ai
        npm run build --workspace=packages/agent
        npm run build --workspace=packages/coding-agent
        npm run build --workspace=packages/mom

        run_mom() {
          npm run dev &
          ROOT_PID=$$!
  
          cd packages/mom
          npx tsx --watch-path src --watch src/main.ts "$${MOM_DATA_DIR:-/data}" &
          MOM_PID=$$!
  
          # If either dies, exit so Docker restarts the container
          wait -n "$$ROOT_PID" "$$MOM_PID"
          exit 1
        }
  
        updater_loop() {
          while true; do
            git fetch origin "$${REPO_BRANCH:-main}" --quiet
            REMOTE="$$(git rev-parse \"origin/$${REPO_BRANCH:-main}\")"
            HEAD="$$(git rev-parse HEAD)"
            if [ "$$REMOTE" != "$$HEAD" ]; then
              git reset --hard "$$REMOTE" --quiet
              echo "$$REMOTE" > "$$GOOD_FILE"
            fi
            sleep "$$CHECK_INTERVAL_SECONDS"
          done
        }
  
        updater_loop &
        run_mom
